name: Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run zip
      - name: Locate package
        run: find . -name '*.zip' -path '*/dist/*' | head -1
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="auto-${SHORT_SHA}"
          ZIP_FILE=$(find . -name '*.zip' -path '*/dist/*' | head -1)
          gh release create "$TAG" "$ZIP_FILE" \
            --target "$GITHUB_SHA" \
            --title "DeepSeek++ ${SHORT_SHA}" \
            --notes "Automated extension build for commit ${GITHUB_SHA}." \
            --clobber